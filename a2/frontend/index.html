<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Music App</title>
    <!-- Modern Styling using Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hidden { display: none; }
        .song-card { transition: transform 0.2s; }
        .song-card:hover { transform: translateY(-5px); }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased">

    <!-- Navbar -->
    <nav class="bg-indigo-600 text-white p-4 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold tracking-wider">☁️ CloudMusic</h1>
            <div id="nav-user-area" class="hidden">
                <span id="welcome-text" class="mr-4 font-medium"></span>
                <button onclick="logout()" class="bg-indigo-500 hover:bg-indigo-700 px-4 py-2 rounded">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container mx-auto p-4 mt-8">

        <!-- ================= LOGIN PAGE ================= -->
        <div id="login-page" class="max-w-md mx-auto bg-white p-8 rounded-lg shadow-lg border border-gray-100">
            <h2 class="text-2xl font-bold mb-6 text-center text-gray-700">Login</h2>
            <div id="login-error" class="hidden bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4 text-sm"></div>
            
            <input type="email" id="login-email" placeholder="Email" class="w-full p-3 mb-4 border rounded focus:outline-none focus:ring-2 focus:ring-indigo-500">
            <input type="password" id="login-password" placeholder="Password" class="w-full p-3 mb-6 border rounded focus:outline-none focus:ring-2 focus:ring-indigo-500">
            
            <button onclick="login()" class="w-full bg-indigo-600 text-white font-bold py-3 rounded hover:bg-indigo-700 transition">Login</button>
            <p class="mt-4 text-center text-sm">Don't have an account? <a href="#" onclick="showPage('register-page')" class="text-indigo-600 font-bold hover:underline">Register</a></p>
        </div>

        <!-- ================= REGISTER PAGE ================= -->
        <div id="register-page" class="hidden max-w-md mx-auto bg-white p-8 rounded-lg shadow-lg border border-gray-100">
            <h2 class="text-2xl font-bold mb-6 text-center text-gray-700">Register</h2>
            <div id="register-error" class="hidden bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4 text-sm"></div>
            
            <input type="email" id="reg-email" placeholder="Email" class="w-full p-3 mb-4 border rounded focus:outline-none focus:ring-2 focus:ring-indigo-500">
            <input type="text" id="reg-username" placeholder="Username" class="w-full p-3 mb-4 border rounded focus:outline-none focus:ring-2 focus:ring-indigo-500">
            <input type="password" id="reg-password" placeholder="Password" class="w-full p-3 mb-6 border rounded focus:outline-none focus:ring-2 focus:ring-indigo-500">
            
            <button onclick="register()" class="w-full bg-green-600 text-white font-bold py-3 rounded hover:bg-green-700 transition">Register</button>
            <p class="mt-4 text-center text-sm">Already have an account? <a href="#" onclick="showPage('login-page')" class="text-indigo-600 font-bold hover:underline">Login</a></p>
        </div>

        <!-- ================= MAIN PAGE ================= -->
        <div id="main-page" class="hidden">
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                <!-- Query Area -->
                <div class="md:col-span-1 bg-white p-6 rounded-lg shadow border border-gray-100">
                    <h3 class="text-xl font-bold mb-4 border-b pb-2">Search Music</h3>
                    <input type="text" id="q-title" placeholder="Title" class="w-full p-2 mb-3 border rounded">
                    <input type="text" id="q-artist" placeholder="Artist" class="w-full p-2 mb-3 border rounded">
                    <input type="text" id="q-year" placeholder="Year" class="w-full p-2 mb-3 border rounded">
                    <input type="text" id="q-album" placeholder="Album" class="w-full p-2 mb-4 border rounded">
                    <button onclick="queryMusic()" class="w-full bg-indigo-600 text-white font-bold py-2 rounded hover:bg-indigo-700">Query</button>
                    <div id="query-msg" class="mt-3 text-sm font-semibold text-center text-red-600"></div>
                </div>

                <!-- Results & Subscriptions Area -->
                <div class="md:col-span-2 space-y-8">
                    
                    <!-- Subscriptions -->
                    <div class="bg-white p-6 rounded-lg shadow border border-gray-100">
                        <h3 class="text-xl font-bold mb-4 border-b pb-2 text-green-700">Your Subscriptions</h3>
                        <div id="subscriptions-container" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <!-- Populated by JS -->
                        </div>
                    </div>

                    <!-- Query Results -->
                    <div id="results-section" class="hidden bg-white p-6 rounded-lg shadow border border-gray-100">
                        <h3 class="text-xl font-bold mb-4 border-b pb-2">Search Results</h3>
                        <div id="results-container" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <!-- Populated by JS -->
                        </div>
                    </div>

                </div>
            </div>
        </div>

    </div>

    <!-- ================= JAVASCRIPT LOGIC ================= -->
    <script>
        // --- CONFIGURATION ---
        // We will update this later to point to your EC2 instance's IP address.
        // For now, it's just a placeholder.
        const API_URL = "http://YOUR_EC2_PUBLIC_IP:80/api"; 
        
        let currentUser = null;

        // --- UI Navigation ---
        function showPage(pageId) {
            ['login-page', 'register-page', 'main-page'].forEach(id => {
                document.getElementById(id).classList.add('hidden');
            });
            document.getElementById(pageId).classList.remove('hidden');
            
            if(pageId === 'main-page') {
                document.getElementById('nav-user-area').classList.remove('hidden');
                document.getElementById('welcome-text').innerText = `Welcome, ${currentUser.user_name}`;
                loadSubscriptions();
            } else {
                document.getElementById('nav-user-area').classList.add('hidden');
            }
        }

        // --- AUTHENTICATION ---
        async function login() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const errorDiv = document.getElementById('login-error');

            try {
                const res = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({email, password})
                });
                const data = await res.json();

                if (res.ok) {
                    currentUser = data;
                    errorDiv.classList.add('hidden');
                    showPage('main-page');
                } else {
                    errorDiv.innerText = data.message;
                    errorDiv.classList.remove('hidden');
                }
            } catch (err) {
                alert("Cannot connect to the server. Have you set up your EC2 instance yet?");
            }
        }

        async function register() {
            const email = document.getElementById('reg-email').value;
            const user_name = document.getElementById('reg-username').value;
            const password = document.getElementById('reg-password').value;
            const errorDiv = document.getElementById('register-error');

            try {
                const res = await fetch(`${API_URL}/register`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({email, user_name, password})
                });
                const data = await res.json();

                if (res.ok) {
                    errorDiv.classList.add('hidden');
                    alert("Registered! Please login.");
                    showPage('login-page');
                } else {
                    errorDiv.innerText = data.message;
                    errorDiv.classList.remove('hidden');
                }
            } catch (err) {
                alert("Cannot connect to server.");
            }
        }

        function logout() {
            currentUser = null;
            document.getElementById('login-email').value = '';
            document.getElementById('login-password').value = '';
            showPage('login-page');
        }

        // --- MUSIC QUERIES ---
        async function queryMusic() {
            const title = document.getElementById('q-title').value;
            const artist = document.getElementById('q-artist').value;
            const year = document.getElementById('q-year').value;
            const album = document.getElementById('q-album').value;
            const msgDiv = document.getElementById('query-msg');
            const resultsSection = document.getElementById('results-section');
            const container = document.getElementById('results-container');

            msgDiv.innerText = "Searching...";
            
            const params = new URLSearchParams();
            if(title) params.append('title', title);
            if(artist) params.append('artist', artist);
            if(year) params.append('year', year);
            if(album) params.append('album', album);

            try {
                const res = await fetch(`${API_URL}/music?${params.toString()}`);
                const data = await res.json();

                if (res.ok) {
                    msgDiv.innerText = "";
                    resultsSection.classList.remove('hidden');
                    container.innerHTML = '';
                    
                    data.results.forEach(song => {
                        container.innerHTML += createSongCard(song, false);
                    });
                } else {
                    resultsSection.classList.add('hidden');
                    msgDiv.innerText = data.message;
                }
            } catch (err) {
                msgDiv.innerText = "Error connecting to server.";
            }
        }

        // --- SUBSCRIPTIONS ---
        async function loadSubscriptions() {
            const container = document.getElementById('subscriptions-container');
            container.innerHTML = '<p class="text-gray-500">Loading...</p>';

            try {
                const res = await fetch(`${API_URL}/subscriptions?email=${currentUser.email}`);
                const data = await res.json();
                
                container.innerHTML = '';
                if (data.subscriptions.length === 0) {
                    container.innerHTML = '<p class="text-gray-500 text-sm">No subscriptions yet.</p>';
                } else {
                    data.subscriptions.forEach(sub => {
                        container.innerHTML += createSongCard(sub.song_data, true);
                    });
                }
            } catch (err) {
                container.innerHTML = '<p class="text-red-500 text-sm">Failed to load.</p>';
            }
        }

        async function subscribe(songJson) {
            const song = JSON.parse(decodeURIComponent(songJson));
            try {
                await fetch(`${API_URL}/subscriptions`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        email: currentUser.email,
                        title_album: song.title_album,
                        song_data: song
                    })
                });
                loadSubscriptions(); // Refresh UI
            } catch (err) {
                alert("Error subscribing.");
            }
        }

        async function removeSubscription(title_album) {
            try {
                await fetch(`${API_URL}/subscriptions`, {
                    method: 'DELETE',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ email: currentUser.email, title_album })
                });
                loadSubscriptions(); // Refresh UI
            } catch (err) {
                alert("Error removing.");
            }
        }

        // --- UI HELPER ---
        function createSongCard(song, isSubscribed) {
            // Encode song data so we can pass it to the subscribe button easily
            const songDataStr = encodeURIComponent(JSON.stringify(song));
            
            const btnHtml = isSubscribed 
                ? `<button onclick="removeSubscription('${song.title_album}')" class="mt-2 w-full bg-red-100 text-red-700 hover:bg-red-200 py-1 rounded text-sm font-bold">Remove</button>`
                : `<button onclick="subscribe('${songDataStr}')" class="mt-2 w-full bg-indigo-100 text-indigo-700 hover:bg-indigo-200 py-1 rounded text-sm font-bold">Subscribe</button>`;

            // Provide fallback image if S3 url fails
            const fallbackImg = "https://via.placeholder.com/150?text=No+Image";

            return `
            <div class="song-card bg-gray-50 border rounded p-3 flex flex-col items-center text-center">
                <img src="${song.image_url}" onerror="this.src='${fallbackImg}'" alt="Artist" class="w-24 h-24 object-cover rounded-full mb-2 shadow">
                <h4 class="font-bold text-gray-800">${song.title}</h4>
                <p class="text-xs text-gray-600">${song.artist} • ${song.year}</p>
                <p class="text-xs text-gray-500 mb-2 italic">${song.album}</p>
                ${btnHtml}
            </div>
            `;
        }
    </script>
</body>
</html>
