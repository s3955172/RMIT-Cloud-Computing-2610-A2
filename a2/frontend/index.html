<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Music App</title>
    <!-- Tailwind CSS for clean layout and styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hidden { display: none !important; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans">

    <!-- Top Navigation / User Area -->
    <nav class="bg-blue-700 text-white p-4 shadow">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold">CloudMusic</h1>
            <!-- User Area (Displays username and Logout link) -->
            <div id="user-area" class="hidden flex items-center space-x-4">
                <span id="display-username" class="font-medium"></span>
                <a href="#" onclick="logout()" class="text-blue-200 hover:text-white underline text-sm">Logout</a>
            </div>
        </div>
    </nav>

    <div class="container mx-auto p-4 mt-8">

        <!-- ================= 1. LOGIN PAGE ================= -->
        <div id="login-page" class="max-w-md mx-auto bg-white p-8 rounded shadow border">
            <h2 class="text-2xl font-bold mb-6 text-center">Login</h2>
            
            <div id="login-msg" class="hidden mb-4 p-2 text-sm text-center font-bold text-red-600 bg-red-100 rounded"></div>
            
            <input type="email" id="login-email" placeholder="Email" class="w-full p-2 mb-4 border rounded">
            <input type="password" id="login-password" placeholder="Password" class="w-full p-2 mb-6 border rounded">
            
            <button onclick="login()" class="w-full bg-blue-600 text-white font-bold py-2 rounded hover:bg-blue-700">Login</button>
            <p class="mt-4 text-center text-sm">Don't have an account? <a href="#" onclick="switchPage('register-page')" class="text-blue-600 hover:underline">Register</a></p>
        </div>

        <!-- ================= 2. REGISTER PAGE ================= -->
        <div id="register-page" class="hidden max-w-md mx-auto bg-white p-8 rounded shadow border">
            <h2 class="text-2xl font-bold mb-6 text-center">Register</h2>
            
            <div id="register-msg" class="hidden mb-4 p-2 text-sm text-center font-bold text-red-600 bg-red-100 rounded"></div>
            
            <input type="email" id="reg-email" placeholder="Email" class="w-full p-2 mb-4 border rounded">
            <input type="text" id="reg-username" placeholder="Username" class="w-full p-2 mb-4 border rounded">
            <input type="password" id="reg-password" placeholder="Password" class="w-full p-2 mb-6 border rounded">
            
            <button onclick="register()" class="w-full bg-green-600 text-white font-bold py-2 rounded hover:bg-green-700">Register</button>
            <p class="mt-4 text-center text-sm">Already have an account? <a href="#" onclick="switchPage('login-page')" class="text-blue-600 hover:underline">Login</a></p>
        </div>

        <!-- ================= 3. MAIN PAGE ================= -->
        <div id="main-page" class="hidden grid grid-cols-1 md:grid-cols-3 gap-6">
            
            <!-- Query Area -->
            <div class="bg-white p-6 rounded shadow border md:col-span-1 h-fit">
                <h3 class="text-lg font-bold mb-4 border-b pb-2">Query Area</h3>
                <input type="text" id="q-title" placeholder="Title" class="w-full p-2 mb-3 border rounded text-sm">
                <input type="text" id="q-year" placeholder="Year" class="w-full p-2 mb-3 border rounded text-sm">
                <input type="text" id="q-artist" placeholder="Artist" class="w-full p-2 mb-3 border rounded text-sm">
                <input type="text" id="q-album" placeholder="Album" class="w-full p-2 mb-4 border rounded text-sm">
                <button onclick="queryMusic()" class="w-full bg-blue-600 text-white font-bold py-2 rounded hover:bg-blue-700">Query</button>
                <div id="query-msg" class="mt-3 text-sm font-bold text-center text-red-600"></div>
            </div>

            <div class="md:col-span-2 space-y-6">
                
                <!-- Subscription Area -->
                <div class="bg-white p-6 rounded shadow border">
                    <h3 class="text-lg font-bold mb-4 border-b pb-2">Subscription Area</h3>
                    <div id="subscriptions-container" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <!-- Filled by JS -->
                    </div>
                </div>

                <!-- Query Results Area -->
                <div id="results-area" class="hidden bg-white p-6 rounded shadow border">
                    <h3 class="text-lg font-bold mb-4 border-b pb-2">Results Area</h3>
                    <div id="results-container" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <!-- Filled by JS -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Javascript Logic -->
    <script>
        // ==========================================
        // EC2 Public IP address
        // ==========================================
        const API_URL = "http://44.196.58.5:80/api";
        
        let currentUser = null; 

        // --- Page Navigation ---
        function switchPage(pageId) {
            ['login-page', 'register-page', 'main-page'].forEach(id => document.getElementById(id).classList.add('hidden'));
            document.getElementById(pageId).classList.remove('hidden');
            
            if (pageId === 'main-page' && currentUser) {
                document.getElementById('user-area').classList.remove('hidden');
                document.getElementById('display-username').innerText = currentUser.user_name; // User Area req
                loadSubscriptions(); // Loads clean state initially
            } else {
                document.getElementById('user-area').classList.add('hidden');
            }
        }

        function showMsg(elementId, message, isError) {
            const el = document.getElementById(elementId);
            el.innerText = message;
            el.className = `mb-4 p-2 text-sm text-center font-bold rounded ${isError ? 'bg-red-100 text-red-600' : 'bg-green-100 text-green-700'}`;
            el.classList.remove('hidden');
        }

        // --- 1. LOGIN LOGIC ---
        async function login() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            try {
                const res = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({email, password})
                });
                const data = await res.json();
                
                if (res.ok) {
                    currentUser = data;
                    document.getElementById('login-msg').classList.add('hidden');
                    switchPage('main-page'); // Redirect to main page
                } else {
                    // Displays exactly: "email or password is invalid"
                    showMsg('login-msg', data.message, true); 
                }
            } catch (e) {
                showMsg('login-msg', "Server connection error.", true);
            }
        }

        // --- 2. REGISTER LOGIC ---
        async function register() {
            const email = document.getElementById('reg-email').value;
            const user_name = document.getElementById('reg-username').value;
            const password = document.getElementById('reg-password').value;
            try {
                const res = await fetch(`${API_URL}/register`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({email, user_name, password})
                });
                const data = await res.json();
                
                if (res.ok) {
                    alert("Registration successful.");
                    switchPage('login-page'); // Redirect to login page
                } else {
                    // Displays exactly: "The email already exists"
                    showMsg('register-msg', data.message, true); 
                }
            } catch (e) {
                showMsg('register-msg', "Server connection error.", true);
            }
        }

        function logout() {
            currentUser = null; // Session terminated
            document.getElementById('login-email').value = '';
            document.getElementById('login-password').value = '';
            document.getElementById('results-area').classList.add('hidden');
            switchPage('login-page');
        }

        // --- 3. QUERY LOGIC ---
        async function queryMusic() {
            const title = document.getElementById('q-title').value;
            const year = document.getElementById('q-year').value;
            const artist = document.getElementById('q-artist').value;
            const album = document.getElementById('q-album').value;
            const msgEl = document.getElementById('query-msg');
            const resultsArea = document.getElementById('results-area');

            const params = new URLSearchParams();
            if(title) params.append('title', title);
            if(year) params.append('year', year);
            if(artist) params.append('artist', artist);
            if(album) params.append('album', album);

            resultsArea.classList.add('hidden');

            try {
                const res = await fetch(`${API_URL}/music?${params.toString()}`);
                const data = await res.json();

                if (res.ok) {
                    msgEl.innerText = "";
                    document.getElementById('results-container').innerHTML = data.results.map(s => renderSongCard(s, false)).join('');
                    resultsArea.classList.remove('hidden');
                } else {
                    // Displays exactly: "No result is retrieved. Please query again"
                    msgEl.innerText = data.message; 
                }
            } catch (e) {
                msgEl.innerText = "Server connection error.";
            }
        }

        // --- 3. SUBSCRIPTION LOGIC ---
        async function loadSubscriptions() {
            const container = document.getElementById('subscriptions-container');
            container.innerHTML = '<p class="text-sm text-gray-500">Loading...</p>';
            try {
                const res = await fetch(`${API_URL}/subscriptions?email=${currentUser.email}`);
                const data = await res.json();
                
                if (data.subscriptions.length === 0) {
                    // Clean state requirement
                    container.innerHTML = '<p class="text-sm text-gray-500">No subscriptions yet.</p>';
                } else {
                    container.innerHTML = data.subscriptions.map(sub => renderSongCard(sub.song_data, true)).join('');
                }
            } catch (e) {
                container.innerHTML = '<p class="text-sm text-red-500">Failed to load subscriptions.</p>';
            }
        }

        async function subscribe(songDataStr) {
            const song = JSON.parse(decodeURIComponent(songDataStr));
            await fetch(`${API_URL}/subscriptions`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ email: currentUser.email, title_album: song.title_album, song_data: song })
            });
            loadSubscriptions(); // Refresh Subscription Area
        }

        async function removeSubscription(title_album) {
            await fetch(`${API_URL}/subscriptions`, {
                method: 'DELETE',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ email: currentUser.email, title_album: title_album })
            });
            loadSubscriptions(); // Refresh Subscription Area
        }

        // Template generator for music cards (displays S3 image and buttons)
        function renderSongCard(song, isSubscribed) {
            const encodedData = encodeURIComponent(JSON.stringify(song));
            
            // Requirement: "Remove" and "Subscribe" buttons
            const btn = isSubscribed 
                ? `<button onclick="removeSubscription('${song.title_album}')" class="w-full mt-2 border border-red-500 text-red-600 hover:bg-red-50 text-xs font-bold py-1 rounded">Remove</button>`
                : `<button onclick="subscribe('${encodedData}')" class="w-full mt-2 bg-blue-100 border border-blue-300 text-blue-700 hover:bg-blue-200 text-xs font-bold py-1 rounded">Subscribe</button>`;

            // Requirement: "corresponding artist image retrieved from S3"
            return `
            <div class="bg-gray-50 border p-3 flex flex-col items-center text-center rounded">
                <img src="${song.image_url}" alt="${song.artist}" class="w-20 h-20 object-cover rounded shadow-sm mb-2">
                <h4 class="font-bold text-gray-800 text-sm">${song.title}</h4>
                <p class="text-xs text-gray-600">${song.artist}</p>
                <p class="text-xs text-gray-500">${song.year}</p>
                <p class="text-xs text-gray-400 italic flex-grow">${song.album}</p>
                ${btn}
            </div>`;
        }
    </script>
</body>
</html>
